<!-- contact page -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <link rel="stylesheet" href="PrintKitchen.css">
 </head>
 <body>
    <div>
        <h1>Contact Us</h1>
        <P>Have questions or feedback? We'd love to hear from you!</P> 
    </div>
    <section>
            <form action="#" method="post">
                <div>
                    <label for="firstName">First Name</label>
                    <input type="text" 
                        id="firstName"
                        name="firstName">
                </div>
                <div>
                    <label for="lastName">Last Name</label>
                    <input type="text" 
                        id="lastName"
                        name="lastName">
                </div> 
                <div>
                    <label for="phoneNumber">Phone Number</label>
                    <input type="number"
                        id="phoneNumber"
                        name="phoneNumber">
                </div>
                <div>
                    <label for="email">Email</label>
                    <input type="email"
                        id="email"
                        name="email">
                </div>
                <div>
                    <label for="message">Custom Item Description</label>
                    <textarea id="message"
                        name="message"
                        row="10"> 
                    </textarea>
                    <button type="submit">Submit</button>
                </div>
            </form>
        </section>
 </body>
 </html>
