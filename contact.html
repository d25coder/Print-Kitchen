 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <link rel="stylesheet" href="PrintKitchen.css">
 </head>
 <body>
    <div class="navbar">
        <div class="logo">Print Kitchen</div>
        <ul class="nav-links">
            <li><a href="PrintKitchen.html">Home</a></li>
        </ul>
    </div>
    <div>
        <h1>Contact Us</h1>
        <P>Have questions or feedback? We'd love to hear from you!</P> 
    </div>
    <section>
            <form action="#" method="post">
                <div>
                    <label for="firstName">First Name</label>
                    <input type="text" 
                        id="firstName"
                        name="firstName">
                </div>
                <div>
                    <label for="lastName">Last Name</label>
                    <input type="text" 
                        id="lastName"
                        name="lastName">
                </div> 
                <div>
                    <label for="phoneNumber">Phone Number</label>
                    <input type="number"
                        id="phoneNumber"
                        name="phoneNumber">
                </div>
                <div>
                    <label for="email">Email</label>
                    <input type="email"
                        id="email"
                        name="email">
                </div>
                <div>
                    <label for="message">Custom Item Description</label>
                    <textarea id="message"
                        name="message"
                        row="10"> 
                    </textarea>
                    <button type="submit">Submit</button>
                </div>
            </form>
        </section>
        
    
        <footer>
            <div class="social-media"> 
                <i class="fa-brands fa-facebook"></i>
                <a href="https://www.facebook.com/search/top?q=print%20kitchen%20" target="_blank" aria-label="Facebook link"> <img src="images/facebook.webp" alt="">Facebook</a> 
 <!--save facebook image to image folder and add to img src"" "  -->
            </div>
        <section class="footer"> 
            <div class="group" id="contact">
                <h4 class="heading">© Print Kitchen. All rights reserved.</h4>
                <a href="mailto:Printkitchen357@gmail.com" class="text">Printkitchen357@gmail.com</a>
                
            </div>
            <address class="group" id="address">
                <h4 class="heading">Location</h4>
                <main class="text">Japan</main> 
            </address>
        </section>
        </footer>
 </body>
 </html>
